# app-boot konfig — fail-closed: DB/AI değerlerinin default'u YOK (AppProperties
# eksikte startup'ı düşürür). Tüm değerler env'den; parola yalnız env.
server:
  port: ${ATS_PORT:8080}
  # Workload yalnız ClusterIP arkasında NGINX ingress'ten erişilir. Tomcat'in
  # RFC forwarded header desteği remoteAddr'ı gerçek client IP'ye indirger;
  # public application rate-limit tüm kullanıcıları ingress pod IP'sinde birleştirmez.
  forward-headers-strategy: native

spring:
  main:
    banner-mode: off
  jackson:
    deserialization:
      # Public başvuru gövdesinde caller-supplied tenant/status gibi gölge
      # alanlar sessizce yutulmaz; tüm controller DTO'larında fail-closed 400.
      fail-on-unknown-properties: true

ats:
  application:
    # Public careers host tek bir tenant kataloğuna bağlanır; caller header/body
    # tenant seçemez. Test seed anchor'ı güvenli varsayılandır, deploy override edebilir.
    public-tenant-id: ${ATS_PUBLIC_TENANT_ID:00000000-0000-0000-0000-000000000001}
  # ATS-0008 D-D / ATS-0018 sınırı: gerçek object-store seçimi G0 owner gate'inde.
  # Yalnız açık dev/test opt-in'i kabul edilir; sessiz production wiring engellenir.
  object-store:
    mode: ${ATS_OBJECT_STORE_MODE:in-memory-dev}
  db:
    url: ${ATS_DB_URL:}
    username: ${ATS_DB_USERNAME:}
    password: ${ATS_DB_PASSWORD:}
  ai:
    # Müşteri-öncelikli çekirdek (ilan -> başvuru -> İK) AI'dan bağımsızdır.
    # AI yalnız açık owner-approved GitOps aktivasyonuyla açılır; enabled=true iken
    # endpoint/ref/WORM/mTLS kapıları aşağıda fail-closed zorunlu kalır.
    enabled: ${ATS_AI_ENABLED:false}
    provider: ${ATS_AI_PROVIDER:http-json}
    base-url: ${ATS_AI_BASE_URL:}
    # P3-gov0 boot-gate: opak deploy endpoint-referansı (URL DEĞİL). Onaylı-model kaydının
    # endpointRef'i ile TAM eşleşmeli; endpointRef→baseUrl eşlemesi deployment-authoritative.
    # DEFAULT YOK (fail-closed; Codex REVISE): deployment AÇIKÇA beyan ETMELİ. Sessiz geçerli-default
    # verilirse bir deployment YALNIZ base-url'le boot eder, bundled http-json-generic onayı otomatik
    # seçilir ve KEYFİ base-url generic-onaylı sayılır → endpointRef→baseUrl invariant'ı baypas olur.
    endpoint-ref: ${ATS_AI_ENDPOINT_REF:}
    # P3-gov0 boot-gate: capability-başına onaylı-model ref'i (mapr_<64hex>, içerik-adresli).
    # DEFAULT YOK (fail-closed; Codex REVISE): deployment AÇIKÇA beyan ETMELİ (biri eksik/boş → boot FAIL).
    # Default provider=http-json {TRANSCRIBE, CITE} → İKİSİ DE zorunlu.
    # live-stt'e geçişte: transcribe-ref'i live-stt kaydına çevir + cite-ref'i BOŞ bırak (live-stt
    # cite çalıştırmaz; beyan edilirse boot FAIL) + endpoint-ref'i live-stt endpoint'ine çevir.
    # Ref hesabı: kayıt kaynağından ApprovedModelSpec.of(...).approvalRef().value() (ATS-0020).
    approvals:
      transcribe-ref: ${ATS_AI_APPROVAL_TRANSCRIBE_REF:}
      cite-ref: ${ATS_AI_APPROVAL_CITE_REF:}
    bearer: ${ATS_AI_BEARER:}
    timeout: ${ATS_AI_TIMEOUT:30s}
    language: ${ATS_AI_LANGUAGE:tr}
    grant-ttl: ${ATS_AI_GRANT_TTL:60s}
    mtls:
      mode: ${ATS_AI_MTLS_MODE:required}
      key-store-path: ${ATS_AI_MTLS_KEYSTORE:}
      key-store-password: ${ATS_AI_MTLS_KEYSTORE_PASSWORD:}
      trust-store-path: ${ATS_AI_MTLS_TRUSTSTORE:}
  security:
    jwks-uri: ${ATS_JWKS_URI:}
    issuer: ${ATS_JWT_ISSUER:}
    audience: ${ATS_JWT_AUDIENCE:}
    tenant-claim-name: ${ATS_JWT_TENANT_CLAIM:tenant}
  authorization:
    # Same-bearer platform permission projection. Empty keeps public careers
    # bootable, but every recruiter endpoint fails closed. Legacy ats-api
    # authorities are an explicit test/rolling-deploy escape hatch only.
    platform-base-url: ${ATS_PLATFORM_AUTHZ_BASE_URL:}
    timeout: ${ATS_PLATFORM_AUTHZ_TIMEOUT:3s}
    allow-legacy-authorities: ${ATS_ALLOW_LEGACY_AUTHZ:false}
  model-governance:
    # P3-gov0 onaylı-model kaynağı (classpath). Boş → boş registry (o durumda boot-gate,
    # aktif provider'ın enabled-capability'lerini APPROVED'a çözemez → fail-closed düşer).
    # Boot-gate girdileri artık ats.ai.provider + ats.ai.endpoint-ref + ats.ai.approvals.* (yukarıda).
    approved-models-resource: ${ATS_APPROVED_MODELS_RESOURCE:model-governance/approved-models.json}
  ingest:
    max-upload-bytes: ${ATS_MAX_UPLOAD_BYTES:104857600}
  resume-import:
    enabled: ${ATS_RESUME_IMPORT_ENABLED:true}
    # Real CV/PII activation remains a named privacy/security owner gate.
    synthetic-only: ${ATS_RESUME_IMPORT_SYNTHETIC_ONLY:true}
    max-upload-bytes: ${ATS_RESUME_IMPORT_MAX_UPLOAD_BYTES:10485760}
    max-pages: ${ATS_RESUME_IMPORT_MAX_PAGES:20}
    max-concurrent-parses: ${ATS_RESUME_IMPORT_MAX_CONCURRENT_PARSES:2}
    # Privacy contract: terminal/expired transient data is swept well inside the <=15m baseline.
    purge-initial-delay: ${ATS_RESUME_IMPORT_PURGE_INITIAL_DELAY:PT30S}
    purge-interval: ${ATS_RESUME_IMPORT_PURGE_INTERVAL:PT5M}
  retention:
    enabled: ${ATS_RETENTION_ENABLED:false}
    cron: ${ATS_RETENTION_CRON:}
    days: ${ATS_RETENTION_DAYS:0}
    tenants: ${ATS_RETENTION_TENANTS:}
