# app-boot konfig — fail-closed: DB/AI değerlerinin default'u YOK (AppProperties
# eksikte startup'ı düşürür). Tüm değerler env'den; parola yalnız env.
server:
  port: ${ATS_PORT:8080}

spring:
  main:
    banner-mode: off

ats:
  db:
    url: ${ATS_DB_URL:}
    username: ${ATS_DB_USERNAME:}
    password: ${ATS_DB_PASSWORD:}
  ai:
    provider: ${ATS_AI_PROVIDER:http-json}
    base-url: ${ATS_AI_BASE_URL:}
    bearer: ${ATS_AI_BEARER:}
    timeout: ${ATS_AI_TIMEOUT:30s}
    language: ${ATS_AI_LANGUAGE:tr}
    grant-ttl: ${ATS_AI_GRANT_TTL:60s}
    mtls:
      mode: ${ATS_AI_MTLS_MODE:required}
      key-store-path: ${ATS_AI_MTLS_KEYSTORE:}
      key-store-password: ${ATS_AI_MTLS_KEYSTORE_PASSWORD:}
      trust-store-path: ${ATS_AI_MTLS_TRUSTSTORE:}
  security:
    jwks-uri: ${ATS_JWKS_URI:}
    issuer: ${ATS_JWT_ISSUER:}
    audience: ${ATS_JWT_AUDIENCE:}
    tenant-claim-name: ${ATS_JWT_TENANT_CLAIM:tenant}
  model-governance:
    # P3-gov0 onaylı-model kaynağı (classpath). Boş → boş registry.
    approved-models-resource: ${ATS_APPROVED_MODELS_RESOURCE:model-governance/approved-models.json}
    # wirings: bu deployment'ın wire'ladığı enabled-capability'ler (provider/model/versiyon).
    # DEFAULT BOŞ (opt-in; burada beyan EDİLMEZ → List.of()). Boot-doğrulama yalnız beyan edilen
    # capability'ler için koşar; onaysız wiring boot'u fail-closed düşürür. Deployment örneği:
    #   ats.model-governance.wirings[0].capability=TRANSCRIBE
    #   ats.model-governance.wirings[0].provider-ref=faz24-live-stt
    #   ats.model-governance.wirings[0].model-id=whisper-tr
    #   ats.model-governance.wirings[0].model-version=v0.1.0
  ingest:
    max-upload-bytes: ${ATS_MAX_UPLOAD_BYTES:104857600}
  retention:
    enabled: ${ATS_RETENTION_ENABLED:false}
    cron: ${ATS_RETENTION_CRON:}
    days: ${ATS_RETENTION_DAYS:0}
    tenants: ${ATS_RETENTION_TENANTS:}
