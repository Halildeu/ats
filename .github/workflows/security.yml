name: security

# ATS-0007 supply-chain: secret-scan (gitleaks) + dependency-review (vuln).
# Native GitHub secret-scanning + push-protection da AÇIK (repo ayarı). Action SHA-pin.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # gitleaks v2: PR scan için GITHUB_TOKEN zorunlu.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    # PR'larda yeni bağımlılıkların güvenlik incelemesi (public'te ücretsiz;
    # Dependency graph repo ayarı açık olmalı — gh api vulnerability-alerts ile açıldı).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
