name: ci

# Public repo → GitHub-hosted runner (ücretsiz + güvenli). ATS-0009: ats public
# yapıldığı için self-hosted KALDIRILDI (public + self-hosted = fork-PR RCE riski).
# ATS-0007: action'lar SHA-pin (supply-chain provenance).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  boundary-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: ATS-0001 boundary guard
        run: bash scripts/check-boundary.sh

  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: install
        run: npm install --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: contract tests
        run: npm test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: temurin
          java-version: "21"
      - name: backend tests (ats-core skeleton)
        run: mvn -B test

  ai-eval:
    # eval-harness BİRİM testleri (harness sağlığı + citation fail-closed invariant).
    # NOT: run_eval.py golden fixture gelmeden exit 1 (fail-closed) → Gate C olarak
    # CI'a BAĞLANMAZ; yalnız harness unit testleri koşar (threat-register T-T2/T-I2 enforced bağı).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai/eval-harness
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: install pytest
        run: python3 -m pip install --quiet pytest
      - name: eval-harness unit tests
        run: python3 -m pytest tests -q

  threat-register-guard:
    # docs/security/threat-register.md drift guard: status vocabulary, ID tekilliği,
    # enforced satırlarının repo'da mevcut path'e bağlı olması (over-claim çürümesini engeller).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: threat-register drift guard
        run: node scripts/check-threat-register.mjs

  event-taxonomy-guard:
    # docs/observability/event-taxonomy.md drift guard (ATS-0010): §0 zarf zorunlu alanları
    # (section-scoped), §2 event satırları (ID regex/tekillik, category/severity/status,
    # Required-extra allow-list), sentinel kritik event silme guard'ı ve YASAK pii_class
    # (raw-pii/content/secret) §2 EVENT satırının pii_class hücresinde görünemez
    # (registry-level fail-closed; runtime serializer redaksiyonu AYRI ve P1 gate-locked).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: event-taxonomy drift guard
        run: node scripts/check-event-taxonomy.mjs

  a11y-standard-guard:
    # docs/frontend/a11y-i18n-standard.md drift guard (ATS-0011): WCAG 2.2 A+AA TAM SET
    # (55) ID→seviye birebir eşleşmesi (eksik/fazla-unknown(AAA)/yanlış-seviye reddedilir) +
    # i18n required (10) + geçerli status + enforced (CI) iddiasının izinli impl/test
    # path'e bağlı olması (standard doc'a self-referans enforced sayılmaz; over-claim guard).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: a11y/i18n standard drift guard
        run: node scripts/check-a11y-standard.mjs

  web-foundation-guard:
    # web/ ürün-yüzeyi temeli (ATS-0011 operationalized): design-token WCAG kontrast HESAPLAMA +
    # target-size≥24 + tr-TR i18n catalog (key/ICU/no-empty) + typed component contracts
    # (forbidden raw-PII/score/affect; no React runtime). Gömülü self-test (12 vektör) + web/ path-scan (no-runtime).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: web-foundation drift guard
        run: node scripts/check-web-foundation.mjs

  product-flow-guard:
    # docs/product/interview-evidence-flow.md drift guard: adım backing çözünürlüğü (path/[[ATS]]) +
    # forbidden/p1_residual dolu + sentinel adımlar + human-oversight state & event-taxonomy hizalama.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: product-flow drift guard
        run: node scripts/check-product-flow.mjs

  data-lifecycle-guard:
    # docs/privacy/data-lifecycle-register.md drift guard (ATS-0003 operationalized):
    # required veri-sınıfları + sözlük (pii_class/plane/deletion/WORM/transfer/status) +
    # invariantlar (content/raw-pii worm-ledger'da olamaz; worm-ledger→EVET+tombstone;
    # legal_basis/retention dolu + [DOLDUR] yasak; transfer-tipi).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: data-lifecycle drift guard
        run: node scripts/check-data-lifecycle.mjs

  eu-ai-act-guard:
    # docs/ai-governance/eu-ai-act-technical-file-index.md drift guard (ATS-0005):
    # required 21 AB AI Act maddesi + statü vocab + overclaim-yasağı (EN+TR uygunluk-iddiası) +
    # mapped-artefakt çözünürlüğü (mevcut path/[[ATS-XXXX]]/PRIVATE:<path>) + ölü-link/kopuk-ADR-ref +
    # evidence-binding (p1→P1, owner→owner/operatör).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: eu-ai-act-index drift guard
        run: node scripts/check-eu-ai-act-index.mjs

  human-oversight-guard:
    # docs/governance/human-oversight-standard.md drift guard (ATS-0004/0005): karar state-machine;
    # FINALIZED yalnız HUMAN_RATIONALE_RECORDED'dan + 6 accountability alanı (actor/role/rationale/
    # evidence/ai-version/outcome); ai→FINALIZED doğrudan yasak; re-open/terminal-çıkış yasak;
    # YASAK auto-decision token'ları; mermaid/flow/gizli-transition reddi; sentinel state'ler.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: human-oversight drift guard
        run: node scripts/check-human-oversight.mjs

  analysis-dimensions-guard:
    # docs/ai-governance/interview-analysis-dimensions.md (ATS-0012): aktif boyutlar içerik-tabanlı
    # (yasaklı input audio/video/biometric YOK; yasaklı output score/ranking/affect YOK) + yasaklı
    # boyutlar (duygu/yalan/davranış) excluded-legal + substitute-eşli + aktif-değil + sentinel.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: analysis-dimensions drift guard
        run: node scripts/check-analysis-dimensions.mjs

  evidence-packet-guard:
    # contracts/schemas/evidence-packet.schema.json + sample drift guard (ATS-0004/0005):
    # minimal JSON-Schema validation ($ref/$defs/pattern + unsupported-keyword fail) + forbidden
    # raw/PII/score/affect alias deep-scan + criterion↔claim + claim_id/criterion_id tekillik +
    # source_evidence_refs(supported+human_reviewed) + gömülü self-test (10 negatif vektör).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: evidence-packet drift guard
        run: node scripts/check-evidence-packet.mjs

  rubric-guard:
    # contracts/schemas/rubric.schema.json + sample drift guard (ATS-0005): job-related criteria only
    # + protected-attribute registry (TR+EN: yaş/din/etnik/sağlık/cinsiyet/sendika/siyasi/hamilelik
    # key+value reddi) + scoring/affect yasağı + criterion_type enum + gömülü self-test (31 neg + 3 allow).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: rubric drift guard
        run: node scripts/check-rubric.mjs

  control-map-guard:
    # docs/security/control-map.md drift guard (ATS-0007): kontrol alanları + statü vocab +
    # cert/uygunluk overclaim yasağı + CROSS-DOC binding (her kontrol threat-register'da MEVCUT
    # T-/P- ID veya repo-path/PRIVATE/accepted-risk'e bağlı; kopuk-ID FAIL) + enforced→path + self-test.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: control-map drift guard
        run: node scripts/check-control-map.mjs

  release-evidence-guard:
    # contracts/schemas/release-evidence.schema.json + sample drift guard (ATS-0007 §6): minimal
    # JSON-Schema + digest-pin (moving-tag yasak) + vuln crit/high=0 + offline-verify + SLSA/SBOM/
    # signature/model-hash zorunlu + gömülü self-test (17 vektör; identity-binding+license+secret+subject+maximum-maxItems-isolated). Gerçek build evidence P3/gate-locked.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: release-evidence drift guard
        run: node scripts/check-release-evidence.mjs

  speaker-attribution-guard:
    # docs/ai-governance/speaker-attribution-standard.md drift guard (ATS-0013): aktif attribution
    # yöntemi allowlist (biyometrisiz 4) + biometric=no + yasak biyometrik-kavram taraması + insan-onay
    # tokeni + sentinel voiceprint_enrollment excluded/aktif-edilemez/ADR-rıza-risk-kabul-koşullu +
    # diarization embedding invariant pini + gömülü self-test (8 negatif vektör). Runtime P1 gate-locked.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: speaker-attribution drift guard
        run: node scripts/check-speaker-attribution.mjs

  ui-snapshot-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20
      - name: "@ats/ui snapshot butunluk guard'i (yasak token/path + closure + surface)"
        run: node scripts/check-ui-snapshot.mjs
      - name: "@ats/ui typecheck (tsc --noEmit, upstream-typed env)"
        working-directory: packages/ui
        run: |
          npm ci --no-audit --no-fund
          npx tsc -p tsconfig.json --noEmit

  mfe-interview-evidence-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20
      - name: "@ats/ui bagimliliklarini kur (file: dep cozumu icin)"
        working-directory: packages/ui
        run: npm ci --no-audit --no-fund
      - name: "mfe-interview-evidence typecheck + test + build"
        working-directory: web/mfe-interview-evidence
        run: |
          npm ci --no-audit --no-fund
          npx tsc -p tsconfig.json --noEmit
          npx vitest run
          npx vite build
      - name: "F3 bundle minimal-yuzey guard'i"
        run: node scripts/check-mfe-bundle.mjs

  kvkk-crosswalk-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: KVKK crosswalk drift guard (kanit-path'leri gercekten var)
        run: node scripts/check-kvkk-crosswalk.mjs

  mfe-start-gate-guard:
    # docs/frontend/mfe-start-gate.md drift guard (ATS-0008 D-C): snapshot SHA 40-hex dondurulmuş +
    # 5 şart bölümü/checklist + curated/dışlanan listeler + AG-Grid-dışlama tokeni (sessiz dahil yasak) +
    # @ats/ui namespace pini + manuel re-snapshot politikası + self-test.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: mfe-start-gate drift guard
        run: node scripts/check-mfe-start-gate.mjs

  connector-capability-guard:
    # contracts/schemas/connector-capability.schema.json + sample drift guard (ATS-0001/0005):
    # export/narrow-writeback mode + auth + forbidden write-back deep-scan (candidate/job/stage/score
    # YASAK) + narrow_writeback p1-evidence-gated + export-no-writeback + gömülü self-test (16 vektör).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: connector-capability drift guard
        run: node scripts/check-connector-capability.mjs

  integration-platform-guard:
    # Faz 25 P4 integration-platform/v1: ATS/HRIS/calendar-email/SSO-SCIM/portability
    # capability matrix + synthetic envelope/idempotency/replay/data-owner invariants.
    # PRE-G0 fixture'da api_verified/VERIFIED/activation-evidence ve raw PII/secret/decision YASAK.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: integration-platform drift guard
        run: node scripts/check-integration-platform.mjs
