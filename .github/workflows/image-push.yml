# ATS app-boot GHCR image push (ATS-0019 39d-1).
#
# Zincir sözleşmesi (Codex 019f4c6c + 019f50b7 daraltması):
#   built local image == scanned local image == SBOM source == pushed image;
#   pushed digest == GitOps pinned digest == pod imageID.
#   (Digest-bağlı SBOM subject doğrulaması / OCI attestation follow-up.)
# "digest:" log satırı downstream (platform-k8s-gitops) için AUTHORITY'dir;
# sha-<short> tag'i yalnız insan-okunur alias.
#
# Güvenlik: minimum workflow izinleri; 3P action'lar commit-SHA pinli;
# trivy CRITICAL bulguda FAIL (push'tan ÖNCE tarama — kırmızı imaj push edilmez).
name: image-push

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/image-push.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: image-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute tag
        id: meta
        run: |
          SHORT=$(git rev-parse --short HEAD)
          echo "image=ghcr.io/${{ github.repository_owner }}/ats-app-boot" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build image (backend context)
        run: |
          docker build \
            -f backend/app-boot/Dockerfile \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" \
            backend

      # Push'tan ÖNCE tarama: HER CRITICAL bulguda (unfixed dahil) job kırmızı,
      # imaj GHCR'a çıkmaz. ignore-unfixed bilinçli KAPALI (Codex 019f50b7 P1:
      # "fixable-only" gevşetmesi fail-closed sözleşmesini zayıflatır).
      - name: Trivy scan (CRITICAL fail-closed)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: '${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}'
          format: table
          exit-code: '1'
          severity: CRITICAL

      # SBOM iddiası DAR (Codex 019f50b7 P1): bu SPDX, push edilenle AYNI
      # LOKAL imajdan (aynı tag, aynı runner, push'tan hemen önce) üretilmiştir;
      # subject==pushed-digest eşitliği ayrıca doğrulanmaz. OCI attestation
      # (imza + digest-bağlı SBOM) follow-up.
      - name: SBOM (syft — push edilen lokal imajdan)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: '${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}'
          format: spdx-json
          artifact-name: ats-app-boot-sbom.spdx.json

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Digest, push ÇIKTISININ kendisinden yakalanır (Codex 019f50b7 P1:
      # RepoDigests[0] sıra varsayımı kırılgan) + biçim/repo doğrulanır;
      # doğrulanamazsa job FAIL (yanlış authority yayınlamak yok).
      - name: Push + digest authority
        run: |
          set -euo pipefail
          IMAGE="${{ steps.meta.outputs.image }}"
          PUSH_OUT=$(docker push "${IMAGE}:${{ steps.meta.outputs.tag }}" | tee /dev/stderr)
          DIGEST=$(printf '%s\n' "$PUSH_OUT" | grep -Eo 'sha256:[0-9a-f]{64}' | tail -1)
          if ! printf '%s' "$DIGEST" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "FATAL: push çıktısından geçerli digest çıkarılamadı" >&2; exit 1
          fi
          # çapraz doğrulama: lokal imajın RepoDigests kümesinde AYNI repo+digest var mı
          if ! docker inspect --format='{{range .RepoDigests}}{{println .}}{{end}}' \
              "${IMAGE}:${{ steps.meta.outputs.tag }}" | grep -Fxq "${IMAGE}@${DIGEST}"; then
            echo "FATAL: push digest'i lokal RepoDigests ile eşleşmedi (${IMAGE}@${DIGEST})" >&2; exit 1
          fi
          echo "ATS app-boot image published:"
          echo "  - tag:      ${{ steps.meta.outputs.tag }}"
          echo "  - digest:   ${DIGEST}"
